name: Daily Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every day at 6 AM IST (00:30 UTC)
    - cron: '30 0 * * *'

jobs:
  # ─────────────────────────────────────────
  # Job 1: TypeScript + Lint
  # ─────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript compile check
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # Job 2: Build Check
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SKIP_ENV_VALIDATION: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://test:test@localhost/test"
          ADMIN_PASSWORD: "ci-test-password"

  # ─────────────────────────────────────────
  # Job 3: Core API Tests
  # ─────────────────────────────────────────
  api-tests:
    name: 🧪 API Route Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Test generate-deployment API (no DB needed)
        run: |
          node -e "
          const { generateDockerCompose, generateDeploymentScript, generateReadme } = require('./lib/deployment-config.js');
          const config = { projectName: 'test-app', language: 'typescript', framework: 'nextjs', databases: ['postgres'], tools: [], serverType: 'docker' };
          console.log('✅ generateDockerCompose:', generateDockerCompose(config).includes('version') ? 'OK' : 'FAIL');
          console.log('✅ generateReadme:', generateReadme(config).includes('test-app') ? 'OK' : 'FAIL');
          "
      - name: Check critical files exist
        run: |
          files=(
            "app/page.tsx"
            "app/generator/page.tsx"
            "app/api/generate-deployment/route.ts"
            "app/api/ai-assistant/route.ts"
            "components/hero-section.tsx"
            "components/generator-form.tsx"
            "lib/auth.ts"
            "lib/db.ts"
            ".env.example"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ MISSING: $f"; exit 1; fi
            echo "✅ $f"
          done

  # ─────────────────────────────────────────
  # Job 4: Security Check
  # ─────────────────────────────────────────
  security:
    name: 🔐 Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no hardcoded secrets
        run: |
          # Fail if any of these patterns exist in code
          patterns=(
            "passwordHash.*=.*\"[^\"]\{4,\}\""
            "apiKey.*=.*\"sk-"
            "apiKey.*=.*\"gsk_"
            "DATABASE_URL.*=.*postgresql://[^$]"
          )
          FOUND=0
          for pattern in "${patterns[@]}"; do
            if grep -rn --include="*.ts" --include="*.tsx" -E "$pattern" \
              --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
              --exclude=".env.example" .; then
              echo "❌ Hardcoded secret found!"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then echo "✅ No hardcoded secrets found"; fi
          exit $FOUND

  # ─────────────────────────────────────────
  # Job 5: CLI Tests
  # ─────────────────────────────────────────
  cli-tests:
    name: ⚡ CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install CLI deps
        run: cd cli && npm ci
      - name: Build CLI
        run: cd cli && npm run build
      - name: Test CLI doctor command (non-interactive)
        run: |
          cd cli
          timeout 10 node dist/index.js doctor || true
          echo "✅ CLI doctor ran without crash"
      - name: Check CLI package.json version
        run: |
          VERSION=$(node -e "console.log(require('./cli/package.json').version)")
          echo "CLI version: $VERSION"
          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]]; then
            echo "⚠️  Pre-release version — remember to bump before launch"
          fi
