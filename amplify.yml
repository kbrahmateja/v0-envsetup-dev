version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist # Change this if your build output folder is different
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*