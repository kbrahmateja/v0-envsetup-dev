version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: out  # Change to `.next` if using SSR (Next.js)
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*

# Optional: If using Amplify environment variables via SSM
env:
  # Replace with your path if needed
  AMPLIFY_MONOREPO_APP_ROOT: envsetup