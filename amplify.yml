version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build  # This should trigger `next build && next export` internally
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*

# Optional: If you're using SSM secrets, customize this
env:
  AMPLIFY_MONOREPO_APP_ROOT: envsetup