version: 1
applications:
  - appRoot: /
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build  # Adjust this if your build output is different
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

    backend:
      phases:
        preBuild:
          commands:
            - echo "No backend to build"