version: 1
applications:
  - appRoot: /   # root of the repo
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build  # Adjust this if you're using a different build output folder
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

    backend:
      phases:
        preBuild:
          commands:
            - echo "No backend to build"  # Optional, if you don't have any backend code