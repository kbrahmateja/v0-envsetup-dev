version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd envsetup
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: envsetup/out
    files:
      - '**/*'
  cache:
    paths:
      - envsetup/node_modules/**/*
      - envsetup/.pnpm-store/**/*
